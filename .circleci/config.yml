version: 2.1

commands:
  setup_sbt:
    description: Get and install SBT
    parameters:
      sbt_version:
        type: string
        default: "2.0.1"
    steps:
      - restore_cache:
          keys:
          - &sbt_cache_key sbt-{{ checksum "project/build.properties" }}

      - run:
          name: Setup SBT
          command: |
                    if [ ! -x ~/sbt/bin/sbt ]; then
                      cd ~/
                      curl --silent -L -o sbt.tgz https://github.com/sbt/sbt/releases/download/v<< parameters.sbt_version >>/sbt-<< parameters.sbt_version >>.tgz
                      tar -xzvf sbt.tgz && rm -f sbt.tgz
                    fi

      - save_cache:
          paths:
            - ~/sbt
          key: *sbt_cache_key

  setup_integration:
    description: Setup integration environment
    steps:
      - restore_cache:
          keys:
          - &mongo_cache_key mongodb-{{ checksum ".ci_scripts/beforeInstall.sh" }}

      - run:
          name: Prepare integration environment
          command: |
                    if [ `which make | wc -l` -eq 0 ]; then
                      sudo apt update
                      sudo apt install build-essential
                    fi
                    ./.ci_scripts/beforeInstall.sh

      - save_cache:
          paths:
            - ~/mongodb-linux-x86_64-amazon-4.2.2
            - ~/ssl
          key: *mongo_cache_key

      - run:
          name: Start integration services
          command: |
                    export MONGO_CONF="/tmp/mongod.conf"
                    ./.ci_scripts/fork-mongod.sh /tmp/validate-env.sh
          background: true

  build_n_tests:
    description: Build & Run tests
    steps:
      - restore_cache:
          keys:
          - &scala_cache_key scala-{{ .Environment.CIRCLE_JOB }}-{{ checksum "version.sbt" }}-{{ checksum "build.sbt" }}-{{ checksum "project/Dependencies.scala" }}

      - run:
          name: Build & Run tests
          command: |
                    export PATH=$PATH:~/sbt/bin
                    export USER=`basename $HOME`
                    
                    ./.ci_scripts/validate.sh

      - save_cache:
          paths:
            - ~/.ivy2
            - ~/.coursier/cache
            - ~/.sbt
          key: *scala_cache_key

  collect_test_reports:
    description: Collect test reports
    steps:
      - run:
          name: Collect test report
          command: |
                    mkdir test-reports
                    find . -path '*/test-reports/*' -name '*.xml' \
                      -print -exec cp {} test-reports \;
          when: always

jobs:
  build_n_test:
    description: Build & Test
    parameters:
      openjdk_version:
        type: string
        default: '26.0'
      scala_version:
        type: string

    docker:
      - image: cimg/openjdk:<< parameters.openjdk_version >>

    working_directory: ~/repo

    environment:
      SCALA_VERSION: << parameters.scala_version >>
    
    steps:
      - checkout
      - setup_sbt
      - setup_integration
      - build_n_tests
      - collect_test_reports
      - store_test_results:
          path: test-reports

  publish_snapshots:
    docker:
      - image: cimg/openjdk:26.0

    working_directory: ~/repo
    
    steps:
      - checkout
      - setup_sbt

      - restore_cache:
          keys:
          - *scala_cache_key

      - run:
          name: Publish artifacts to Sonatype Snapshots
          command: |
                    if [ ! "${CIRCLE_BRANCH}" = "master" ]; then
                      echo "Skipped on branch ${CIRCLE_BRANCH}"
                      exit 0
                    fi

                    if [ "x$PUBLISH_USER" = "x" -o "x$PUBLISH_PASS" = "x" ]; then
                      echo "Missing publication credentials"
                      exit 1
                    fi

                    V=$(sbt --server 'show version' 2>&1 | sed 's/\x1b\[0[Jm]//g' | grep --color=never '[0-9]\+\.[0-9]\+' | tail -1 | sed 's/\[info\]//' | xargs | tr -cd '[:alnum:]._-')

                    if [[ "$V" != *SNAPSHOT* ]]; then
                      echo "Skip non snapshot: $V"
                      exit 0
                    fi

                    export PUBLISH_REPO_NAME="Sonatype Nexus Repository Manager"
                    export PUBLISH_REPO_ID="central.sonatype.com"
                    export PUBLISH_REPO_URL="https://central.sonatype.com/repository/maven-snapshots/"                    
                 
                    sbt --server +publish

      - save_cache:
          paths:
            - ~/.ivy2
            - ~/.coursier/cache
            - ~/.sbt
          key: *scala_cache_key

workflows:
  version: 2

  main_suite:
    jobs:
      - build_n_test:
          name: jdk26_scala212
          scala_version: '2.12'

      - build_n_test:
          name: jdk17_scala213
          scala_version: '2.13'
          openjdk_version: '17.0'

      - build_n_test:
          name: jdk26_scala3
          scala_version: '3.4'

      - publish_snapshots:
          filters:
            branches:
              only:
                - master
          requires:
            - jdk26_scala212
            - jdk17_scala213
            - jdk26_scala3
